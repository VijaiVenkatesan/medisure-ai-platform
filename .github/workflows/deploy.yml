name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # BACKEND: Test
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-render.txt
      - name: Run tests
        env:
          GROQ_API_KEY: "gsk_test_placeholder_not_real"
          DATABASE_URL: "sqlite+aiosqlite:///./test_ci.db"
          CHROMA_PERSIST_DIR: "./test_chroma_ci"
          LOG_LEVEL: "WARNING"
          LOG_FILE: ""
          RENDER: "true"
          OCR_ENGINE: "pypdf"
          GROQ_MODEL_PRIMARY: "llama-3.3-70b-versatile"
          GROQ_MODEL_FAST: "llama-3.1-8b-instant"
          GROQ_MODEL_ANALYSIS: "llama-3.3-70b-versatile"
          SECRET_KEY: "test-secret-key-for-ci-only"
          ADMIN_PASSWORD: "Admin@Test123"
          REVIEWER_PASSWORD: "Reviewer@Test123"
          USER_PASSWORD: "User@Test123"
        run: pytest tests/ -v --tb=short --no-header -x --timeout=30
      - name: Cleanup
        if: always()
        run: rm -rf ./test_ci.db* ./test_chroma_ci

  # ─────────────────────────────────────────────
  # FRONTEND: Build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: ui
        run: npm install
      - name: Build
        working-directory: ui
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://medisure-api-vyx1.onrender.com/api/v1' }}
          VITE_DEMO_ADMIN_PW: ${{ secrets.VITE_DEMO_ADMIN_PW || 'Admin@MediSure#2026' }}
          VITE_DEMO_REVIEWER_PW: ${{ secrets.VITE_DEMO_REVIEWER_PW || 'Reviewer@MediSure#2026' }}
          VITE_DEMO_USER_PW: ${{ secrets.VITE_DEMO_USER_PW || 'User@MediSure#2026' }}
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ui/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # DEPLOY: Cloudflare Pages — main branch only
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=medisure-ai-platform --commit-dirty=true
        continue-on-error: true
